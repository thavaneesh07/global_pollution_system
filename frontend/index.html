<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌍 AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
}

h1 {
    text-align: center;
    padding-top: 20px;
}

/* 🔥 BUTTONS */
.btn {
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    margin: 5px;
    transition: all 0.3s ease;
}

.btn-primary {
    background: linear-gradient(45deg, #3b82f6, #06b6d4);
    color: white;
}

.btn-upload {
    background: linear-gradient(45deg, #22c55e, #4ade80);
    color: white;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(255,255,255,0.2);
}

/* 🔥 CUSTOM FILE INPUT */
.file-wrapper {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
}

.file-label {
    background: #1e293b;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid #334155;
    cursor: pointer;
}

.file-label:hover {
    background: #334155;
}

#file-name {
    font-size: 14px;
    color: #cbd5f5;
}

/* Layout */
.center {
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 20px;
    padding: 20px;
}

.card {
    background: rgba(30,41,59,0.7);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

canvas {
    height: 200px !important;
}

/* 🔥 CHATBOX CENTER FIX */
.chat-container {
    display: flex;
    justify-content: center;
    padding: 20px;
}

.chat-card {
    width: 60%;
    text-align: center;
}

/* Chat input */
#msg {
    padding: 8px;
    border-radius: 8px;
    border: none;
    width: 60%;
    margin-right: 5px;
}
</style>
</head>

<body>

<h1>🌍 AI Pollution Dashboard</h1>

<div class="center">

    <button class="btn btn-primary" onclick="loadAll()">🚀 Load Dashboard</button>

    <br><br>

    <!-- 🔥 CUSTOM FILE INPUT -->
    <div class="file-wrapper">
        <label for="file" class="file-label">📂 Choose Dataset</label>
        <input type="file" id="file" hidden onchange="showFileName()">
        <span id="file-name">No file chosen</span>
    </div>

    <br>

    <button class="btn btn-upload" onclick="upload()">📤 Upload Dataset</button>

    <p id="detect"></p>

</div>

<div class="grid">

<div class="card">
<h3>🌫️ Air Analysis</h3>
<canvas id="airChart"></canvas>
</div>

<div class="card">
<h3>🔮 Air Forecast</h3>
<canvas id="airForecastChart"></canvas>
</div>

<div class="card">
<h3>🌊 Water Analysis</h3>
<canvas id="waterChart"></canvas>
</div>

<div class="card">
<h3>🔮 Water Forecast</h3>
<canvas id="waterForecastChart"></canvas>
</div>

</div>

<!-- 🔥 CENTERED CHATBOX -->
<div class="chat-container">
    <div class="card chat-card">
        <h3>🤖 AI Chatbot</h3>
        <input id="msg" placeholder="Ask anything...">
        <button class="btn btn-primary" onclick="send()">Send</button>
        <p id="reply"></p>
    </div>
</div>

<script>
let charts = {};

function draw(id,type,labels,values){
let ctx=document.getElementById(id).getContext("2d");
if(charts[id]) charts[id].destroy();

charts[id]=new Chart(ctx,{
type:type,
data:{labels:labels,datasets:[{data:values}]}
});
}

/* 🔥 SHOW FILE NAME */
function showFileName(){
let file = document.getElementById("file").files[0];
document.getElementById("file-name").innerText = file ? file.name : "No file chosen";
}

async function loadAll(){

let air=await fetch("http://127.0.0.1:5000/air-analysis").then(r=>r.json());
draw("airChart","bar",air.labels,air.values);

let airF=await fetch("http://127.0.0.1:5000/air-forecast").then(r=>r.json());
draw("airForecastChart","line",airF.labels,airF.values);

let water=await fetch("http://127.0.0.1:5000/water-analysis").then(r=>r.json());
draw("waterChart","bar",water.labels,water.values);

let waterF=await fetch("http://127.0.0.1:5000/water-forecast").then(r=>r.json());
draw("waterForecastChart","line",waterF.labels,waterF.values);

}

async function upload(){
let file=document.getElementById("file").files[0];
let formData=new FormData();
formData.append("file",file);

let res=await fetch("http://127.0.0.1:5000/upload",{method:"POST",body:formData});
let data=await res.json();

document.getElementById("detect").innerText="Detected: "+data.type;

loadAll();
}

async function send(){
let msg=document.getElementById("msg").value;

let res=await fetch("http://127.0.0.1:5000/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
});

let data=await res.json();
document.getElementById("reply").innerText=data.reply;
}
</script>

</body>
</html>
